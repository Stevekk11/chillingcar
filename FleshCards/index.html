<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literatura - Flashcards</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Background Effects -->
        <div class="background-gradient"></div>
        <div class="stars-container" id="stars"></div>
        <div class="ember-container" id="embers"></div>

        <header>
            <div class="logo">
                <span class="gradient-text">Lit</span>Cards
            </div>
            <nav class="tabs">
                <button id="tab-study" class="tab active">Karty</button>
                <button id="tab-quiz" class="tab">Kvíz</button>
                <button id="tab-match" class="tab">Přiřazování</button>
            </nav>
        </header>

        <main>
            <!-- STUDY MODE -->
            <section id="view-study" class="view active">
                <div class="controls">
                    <button id="open-filters-btn" class="action-btn">🎯 Filtry</button>
                    <button id="shuffle-btn" class="action-btn">🔀 Zamíchat</button>
                    <div class="deck-stats">Karet: <span id="total-cards-badge">0</span></div>
                </div>

                <!-- NEW: Filter Panel -->
                <div id="filter-panel" class="filter-panel">
                    <div class="filter-content">
                        <div class="filter-header">
                            <h3 class="gradient-text">Konfigurace studování</h3>
                            <button id="close-filters-btn" class="close-btn">&times;</button>
                        </div>
                        


                        <div class="filter-section">
                            <h4>Speciální typy</h4>
                            <div class="checkbox-grid">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" id="type-authors-works" checked>
                                    <span class="checkbox-tile">
                                        <span class="tile-icon">📚</span>
                                        <span class="tile-label">Autoři a hlavní díla</span>
                                    </span>
                                </label>
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" id="type-eras-years" checked>
                                    <span class="checkbox-tile">
                                        <span class="tile-icon">⌛</span>
                                        <span class="tile-label">Období a roky</span>
                                    </span>
                                </label>
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" id="type-everything" checked>
                                    <span class="checkbox-tile">
                                        <span class="tile-icon">✍️</span>
                                        <span class="tile-label">Všechny ostatní info</span>
                                    </span>
                                </label>
                            </div>
                        </div>

                        <button id="apply-filters-btn" class="btn primary full-width">Spustit studování</button>
                    </div>
                </div>
                
                <div class="flashcard-container">
                    <button id="prev-btn" class="nav-btn">&larr;</button>
                    
                    <div class="flashcard" id="flashcard">
                        <div class="flashcard-inner" id="flashcard-inner">
                            <div class="flashcard-front">
                                <span id="card-type-badge-front" class="badge top-badge">...</span>
                                <h2 id="card-front-prompt">...</h2>
                                <p class="hint">Klikni pro zobrazení odpovědi</p>
                            </div>
                            <div class="flashcard-back">
                                <span id="card-type-badge-back" class="badge top-badge">Odpověď</span>
                                <div class="answer-content">
                                    <h2 class="gradient-text" id="card-back-answer">...</h2>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button id="next-btn" class="nav-btn">&rarr;</button>
                </div>

                <div class="progress">
                    <span id="study-progress-text">1 / 10</span>
                </div>
            </section>

            <!-- QUIZ MODE -->
            <section id="view-quiz" class="view">
                <div class="quiz-container">
                    <div class="quiz-header">
                        <h3>Kdo napsal toto dílo?</h3>
                        <h2 id="quiz-question" class="gradient-text">...</h2>
                    </div>
                    <div class="quiz-options" id="quiz-options">
                        <!-- Options generated by JS -->
                    </div>
                    <div class="quiz-feedback" id="quiz-feedback"></div>
                    <button id="quiz-next-btn" class="btn primary hidden">Další otázka</button>
                    <div class="progress">
                        <span>Skóre: <span id="quiz-score">0</span></span>
                    </div>
                </div>
            </section>

            <!-- MATCH MODE -->
            <section id="view-match" class="view">
                <div class="quiz-container">
                    <div class="quiz-header">
                        <h3>Co z níže uvedeného platí pro:</h3>
                        <h2 id="match-question" class="gradient-text">...</h2>
                        <p class="match-subtitle">Vyber všechny správné možnosti (může jich být víc!)</p>
                    </div>
                    <div class="match-options" id="match-options">
                        <!-- Options generated by JS -->
                    </div>
                    <div class="quiz-feedback" id="match-feedback"></div>
                    <div class="match-controls">
                        <button id="match-check-btn" class="btn primary">Zkontrolovat</button>
                        <button id="match-next-btn" class="btn primary hidden">Další úkol</button>
                    </div>
                    <div class="progress">
                        <span>Skóre: <span id="match-score">0</span></span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Create embers
        const embersContainer = document.getElementById('embers');
        for (let i = 0; i < 12; i++) {
            const ember = document.createElement('div');
            ember.className = 'ember-particle';
            ember.style.left = Math.random() * 100 + '%';
            ember.style.setProperty('--duration', (8 + Math.random() * 6) + 's');
            ember.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
            ember.style.animationDelay = Math.random() * 5 + 's';
            embersContainer.appendChild(ember);
        }
    </script>
</body>
</html>
