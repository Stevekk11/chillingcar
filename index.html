<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChillingCar - Exam Countdown</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0;">
    <!-- Header Image - Full Width -->
    <div class="headbar-full-width" style="width: 100vw; margin: 0; padding: 0; position: relative; z-index: 100;">
        <img src="HeadBar.png" alt="ChillingCar.com" class="headbar-image-full" style="width: 100%; height: auto; display: block; margin: 0; padding: 0; position: relative; z-index: 101;">
    </div>

    <!-- Background Effects -->
    <div class="background-gradient"></div>
    <div class="fog-layer"></div>
    <div class="stars-container" id="stars"></div>
    <div class="ember-container" id="embers"></div>

    <!-- Main Content -->
    <div class="container" style="padding-top: 2rem; position: relative; z-index: 10;">
        <header>
            <h1 class="main-title">EXAM COUNTDOWN</h1>
            <h2 id="current-exam-title">Select an Exam</h2>
            <div class="fleshcards-link-container" style="gap: 1rem;">
                <a href="FlashCards/index.html" class="fleshcards-btn btn btn-primary m-2">Učit se literaturu</a>
                <a href="FleshCards/literarni-test/index.html" class="fleshcards-btn btn btn-primary m-2"
                   style="background: transparent; color: var(--accent-orange); border: 2px solid var(--accent-orange);">Literární
                    Test</a>
            </div>
        </header>

        <main style="display: flex; flex-direction: column; align-items: center; gap: 2rem; margin-top: 2rem; width: 100%;">
            <div class="countdown-container" id="countdown-display">
                <div class="time-block">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="time-block">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="time-block">
                    <span class="number" id="minutes">00</span>
                    <span class="label">Minutes</span>
                </div>
                <div class="time-block">
                    <span class="number" id="seconds">00</span>
                    <span class="label">Seconds</span>
                </div>
            </div>

            <div class="exams-list">
                <h3>Upcoming Exams</h3>
                <ul id="exam-list">
                    <!-- dynamically populated by JS -->
                </ul>
            </div>

            <div class="exams-list past-exams-list">
                <h3>Past Exams</h3>
                <ul id="past-exam-list">
                </ul>
            </div>

        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
        star.style.animationDelay = Math.random() * 3 + 's';
        starsContainer.appendChild(star);
        }

        // Create embers
        const embersContainer = document.getElementById('embers');
        for (let i = 0; i < 15; i++) {
        const ember = document.createElement('div');
        ember.className = 'ember-particle';
        ember.style.left = Math.random() * 100 + '%';
        ember.style.setProperty('--duration', (8 + Math.random() * 6) + 's');
        ember.style.setProperty('--drift', (Math.random() * 60 - 30) + 'px');
        ember.style.animationDelay = Math.random() * 5 + 's';
        embersContainer.appendChild(ember);
        }
    </script>
</body>
</html>
